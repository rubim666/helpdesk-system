<body class="bg-on-primary-fixed min-h-screen flex items-center justify-center p-md relative overflow-hidden">
<!-- Ambient Background Glows -->
<div class="absolute inset-0 pointer-events-none overflow-hidden flex items-center justify-center">
<div class="w-[600px] h-[600px] bg-primary rounded-full mix-blend-screen opacity-10 blur-[100px] absolute top-1/4 left-1/4"></div>
<div class="w-[500px] h-[500px] bg-secondary rounded-full mix-blend-screen opacity-10 blur-[120px] absolute bottom-1/4 right-1/4"></div>
</div>
<!-- Main Authentication Terminal -->
<main class="w-full max-w-[440px] bg-inverse-surface border border-outline/30 rounded-xl shadow-2xl relative z-10 flex flex-col">
<!-- Terminal Header -->
<header class="bg-on-background/20 border-b border-outline/30 p-md flex items-center justify-between rounded-t-xl">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary-fixed" style="font-variation-settings: 'FILL' 1;">terminal</span>
<h1 class="font-h2 text-h2 text-on-primary tracking-tight">HELDESK_OS</h1>
</div>
<div class="flex items-center gap-xs">
<span class="w-2 h-2 rounded-full bg-primary"></span>
<span class="font-label-caps text-label-caps text-outline-variant">SECURE_LINK</span>
</div>
</header>
<!-- Authentication Form -->
<form class="p-lg flex flex-col gap-lg">
<div class="flex flex-col gap-sm">
<p class="font-body-sm text-body-sm text-surface-variant mb-xs">
                    Please provide your operator credentials to access the main dispatch terminal.
                </p>
<!-- User ID Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-surface-variant flex items-center gap-xs" for="userId">
<span class="material-symbols-outlined" style="font-size: 14px;">badge</span>
                        User ID
                    </label>
<div class="relative">
<input autocomplete="username" class="w-full font-data-mono text-data-mono bg-surface text-on-surface border border-outline-variant rounded-md pl-md pr-sm py-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-colors shadow-inner" id="userId" placeholder="OP-XXXX" type="text"/>
</div>
</div>
<!-- Access Code Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-surface-variant flex items-center gap-xs" for="accessCode">
<span class="material-symbols-outlined" style="font-size: 14px;">password</span>
                        Access Code
                    </label>
<div class="relative">
<input autocomplete="current-password" class="w-full font-data-mono text-data-mono bg-surface text-on-surface border border-outline-variant rounded-md pl-md pr-sm py-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-colors shadow-inner tracking-[0.2em]" id="accessCode" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-md pt-sm border-t border-outline/20">
<button class="w-full bg-primary hover:bg-surface-tint text-on-primary font-label-caps text-label-caps rounded-md py-md transition-colors flex justify-center items-center gap-sm shadow-md" type="button">
<span class="material-symbols-outlined" style="font-size: 16px;">login</span>
                    Initiate Session
                </button>
<div class="text-center">
<span class="font-body-sm text-body-sm text-outline font-mono text-[10px] uppercase">
                        UNAUTHORIZED ACCESS STRICTLY PROHIBITED
                    </span>
</div>
</div>
</form>
</main>
</body></html>
